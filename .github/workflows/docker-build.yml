name: Docker CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t harinath641/cloud-native-devops:v1 ./app

      - name: Push Docker Image
        run: |
          docker push harinath641/cloud-native-devops:v1
                - name: Deploy to EC2

        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |

            sudo docker stop $(sudo docker ps -q) || true

            sudo docker rm $(sudo docker ps -aq) || true

            sudo docker pull harinath641/cloud-native-devops:v1

            sudo docker run -d -p 80:80 harinath641/cloud-native-devops:v1